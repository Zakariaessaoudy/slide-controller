<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Slide Controller</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#5865f2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Slides" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <h1>Slide Controller</h1>

  <div class="controls">
    <button id="btn-prev" class="btn btn--prev" ontouchstart="">&#9664; Prev</button>
    <button id="btn-next" class="btn btn--next" ontouchstart="">Next &#9654;</button>
  </div>

  <p class="status" id="status" aria-live="polite"></p>

  <p class="hint">Tap a button &nbsp;·&nbsp; or swipe left / right</p>

  <script src="/static/controller.js"></script>
</body>
</html>
